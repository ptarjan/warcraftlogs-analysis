# One-click deploy to Render's free tier.
#   1. Push this repo to GitHub.
#   2. render.com -> New -> Blueprint -> pick this repo.
#   3. Set WCL_CLIENT_ID / WCL_CLIENT_SECRET when prompted (sync:false = set in dashboard).
# Free web services sleep when idle (~30-60s cold start) but cost nothing.
services:
  - type: web
    name: warcraftlogs-analysis
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # -w 1 + threads: SSE streams each hold a thread; --timeout 0 so long
    # analyses are never killed mid-stream. Bind to Render's $PORT.
    startCommand: gunicorn -k gthread -w 1 --threads 8 --timeout 0 --bind 0.0.0.0:$PORT webapp:app
    envVars:
      - key: WCL_CLIENT_ID
        sync: false
      - key: WCL_CLIENT_SECRET
        sync: false
