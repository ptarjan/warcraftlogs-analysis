<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warcraft Logs Analysis</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./favicon.svg">
<style>
  :root {
    --bg: #0d1017; --bg2: #131825; --panel: #161b27; --panel2: #1b212f;
    --edge: #2a3243; --edge2: #394257; --ink: #eef1f7; --muted: #95a0b8;
    --accent: #f5c451; --accent-d: #e2a92e; --ok: #58d6a0; --warn: #ff8a6b;
    --info: #8fb8ff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; color: var(--ink); min-height: 100vh;
         background: radial-gradient(1100px 600px at 50% -10%, var(--bg2), var(--bg)) fixed;
         font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         -webkit-font-smoothing: antialiased; }
  header { padding: 30px 20px 10px; max-width: 980px; margin: 0 auto; }
  h1 { margin: 0; font-size: 25px; font-weight: 700; letter-spacing: .2px;
       background: linear-gradient(90deg, #ffe08a, var(--accent));
       -webkit-background-clip: text; background-clip: text; color: transparent; }
  .sub { color: var(--muted); font-size: 13.5px; margin-top: 6px; max-width: 640px; }
  .auth { margin-top: 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .auth .conn { font-size: 12.5px; }
  .auth .conn.ok { color: var(--ok); font-weight: 600; }
  .auth .conn.muted { color: var(--muted); }
  .linkbtn { background: none; border: 0; padding: 0; box-shadow: none; cursor: pointer;
             font: inherit; font-size: 12.5px; color: var(--muted);
             text-decoration: underline; text-underline-offset: 2px; }
  .linkbtn:hover:not(:disabled) { filter: none; color: var(--ink); }
  .linkbtn.accent { color: #20180a; text-decoration: none; font-weight: 700;
             background: linear-gradient(180deg, var(--accent), var(--accent-d));
             border-radius: 9px; padding: 9px 18px; font-size: 14px;
             box-shadow: 0 4px 14px rgba(245,196,81,.22); }
  .linkbtn.accent:hover { filter: brightness(1.07); color: #20180a; }
  main { max-width: 980px; margin: 0 auto; padding: 14px 20px 80px; }
  form { background: linear-gradient(180deg, var(--panel2), var(--panel));
         border: 1px solid var(--edge); border-radius: 14px; padding: 20px;
         display: grid; gap: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.35);
         grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); align-items: end; }
  label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px;
          text-transform: uppercase; letter-spacing: .7px; font-weight: 600; }
  input, select { width: 100%; padding: 9px 11px; background: #0f131c; color: var(--ink);
                  border: 1px solid var(--edge); border-radius: 8px; font-size: 14px;
                  transition: border-color .15s, box-shadow .15s; }
  input::placeholder { color: #5e6b82; }
  input:focus, select:focus { outline: none; border-color: var(--accent);
                              box-shadow: 0 0 0 3px rgba(245,196,81,.16); }
  .wide { grid-column: 1 / -1; }
  .checks { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 10px 16px; }
  .checks label { text-transform: none; letter-spacing: 0; color: var(--ink); font-size: 13px;
                  font-weight: 400; display: flex; align-items: center; gap: 7px; margin: 0;
                  cursor: pointer; padding: 4px 0; }
  .checks input { width: auto; accent-color: var(--accent); }
  .actions { grid-column: 1 / -1; display: flex; gap: 14px; align-items: center; }
  button { background: linear-gradient(180deg, var(--accent), var(--accent-d)); color: #20180a;
           border: 0; border-radius: 9px; padding: 11px 26px; font-size: 15px; font-weight: 700;
           cursor: pointer; transition: filter .15s, transform .05s;
           box-shadow: 0 4px 14px rgba(245,196,81,.22); }
  button:hover:not(:disabled) { filter: brightness(1.07); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: .55; cursor: default; box-shadow: none; }
  .status { color: var(--muted); font-size: 13px; }
  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--edge2);
          border-top-color: var(--accent); border-radius: 50%; animation: s .8s linear infinite;
          vertical-align: -2px; margin-right: 6px; }
  @keyframes s { to { transform: rotate(360deg); } }
  details { grid-column: 1 / -1; }
  summary { color: var(--muted); font-size: 11px; cursor: pointer; text-transform: uppercase;
            letter-spacing: .7px; font-weight: 600; }
  details[open] summary { margin-bottom: 10px; }
  a { color: var(--accent); }

  /* ---- results: a column of cards instead of a terminal ---- */
  #out { margin-top: 24px; display: flex; flex-direction: column; gap: 16px; }
  #out:empty::before { content: "Your report will appear here."; color: var(--muted);
    display: block; padding: 28px; text-align: center; font-size: 14px;
    border: 1px dashed var(--edge); border-radius: 14px; }

  .card { background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--edge); border-radius: 14px; overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,.25); }
  .card > h2 { margin: 0; padding: 13px 18px; font-size: 12.5px; font-weight: 700;
    letter-spacing: .6px; text-transform: uppercase; color: var(--accent);
    border-bottom: 1px solid var(--edge); background: rgba(255,255,255,.02); }
  .card .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  /* collapsible supporting cards */
  details.card > summary { padding: 13px 18px; font-size: 12.5px; font-weight: 700;
    letter-spacing: .6px; text-transform: uppercase; color: var(--muted); cursor: pointer;
    list-style: none; display: flex; align-items: center; gap: 8px; }
  details.card > summary::-webkit-details-marker { display: none; }
  details.card > summary::before { content: "▸"; color: var(--accent); font-size: 11px; }
  details.card[open] > summary { color: var(--accent); border-bottom: 1px solid var(--edge);
    background: rgba(255,255,255,.02); }
  details.card[open] > summary::before { content: "▾"; }
  .card.primary { border-color: rgba(245,196,81,.4); box-shadow: 0 8px 28px rgba(245,196,81,.10); }
  .sub-h { font-size: 15px; font-weight: 700; color: var(--ink); }
  .sub-h2 { font-size: 13px; font-weight: 600; color: var(--info); }

  .mono { margin: 0; background: #0b0e15; border: 1px solid var(--edge); border-radius: 10px;
    padding: 12px 14px; overflow-x: auto; white-space: pre; color: #aeb8cc;
    font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; }
  .mono .worse { color: var(--warn); }

  /* hero / character header */
  .hero { background: radial-gradient(600px 200px at 0% 0%, rgba(245,196,81,.08), transparent),
          linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--edge); border-radius: 14px; padding: 20px 22px;
    box-shadow: 0 6px 20px rgba(0,0,0,.25); }
  .hero .who { font-size: 24px; font-weight: 800; letter-spacing: .2px; }
  .hero .who small { color: var(--muted); font-weight: 500; font-size: 14px; margin-left: 6px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .pill { font-size: 12px; padding: 5px 11px; border-radius: 999px; font-weight: 600;
    background: rgba(245,196,81,.12); color: var(--accent); border: 1px solid rgba(245,196,81,.3); }
  .pill.muted { background: rgba(255,255,255,.04); color: var(--muted); border-color: var(--edge); }
  .detecting { color: var(--muted); font-size: 13px; margin-top: 12px; display: flex;
    align-items: center; gap: 8px; }

  /* prescription action cards */
  .rx { display: flex; gap: 12px; align-items: flex-start; padding: 13px 14px;
    background: rgba(88,214,160,.06); border: 1px solid rgba(88,214,160,.22); border-radius: 11px; }
  .rx .num { font-weight: 800; color: var(--ok); min-width: 16px; font-size: 14px; }
  .rx .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
    background: var(--ok); color: #06110b; white-space: nowrap; }
  .rx .txt { flex: 1; font-size: 13.5px; line-height: 1.5; }
  .rx.info { background: rgba(143,184,255,.06); border-color: rgba(143,184,255,.22); }
  .rx.info .num { color: var(--info); }
  .rx.info .badge { background: var(--info); color: #06111f; }
  .note { font-size: 13.5px; line-height: 1.5; color: var(--ink); }
  .note.err { color: var(--warn); font-weight: 600; }
</style>
</head>
<body>
<header>
  <h1>⚔ Warcraft Logs Analysis</h1>
  <div class="sub">Compare a character's DPS against the ilvl-matched field, then get a
    prioritized to-do list. Class, spec, difficulty, and stat priority are detected
    automatically. Runs entirely in your browser (30s–2&nbsp;min).</div>
  <div id="auth" class="auth"></div>
</header>
<main>
  <form id="form">
    <div><label for="name">Character</label>
      <input id="name" placeholder="Hadryan" required autofocus></div>
    <div><label for="region">Region</label>
      <select id="region">
        <option>US</option><option>EU</option><option>KR</option><option>TW</option><option>CN</option>
      </select></div>
    <div><label for="server">Server</label>
      <select id="server"></select></div>
    <div class="actions">
      <button id="go" type="submit">Analyze</button>
      <span class="status" id="status"></span>
    </div>
  </form>
  <div id="out"></div>
</main>
<script type="module" src="./app.js"></script>
</body>
</html>
