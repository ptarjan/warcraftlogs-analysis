<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warcraft Logs Analysis</title>
<style>
  :root {
    --bg: #14110d; --panel: #1f1a13; --edge: #3a2f1f; --ink: #e8dcc4;
    --muted: #a08d6a; --accent: #e0a72a; --ok: #6fbf4f; --warn: #d96b4a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 15px/1.5 -apple-system, Segoe UI, Roboto, sans-serif; }
  header { padding: 22px 20px 6px; }
  h1 { margin: 0; font-size: 22px; color: var(--accent); letter-spacing: .3px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  main { max-width: 980px; margin: 0 auto; padding: 12px 20px 60px; }
  form { background: var(--panel); border: 1px solid var(--edge); border-radius: 10px;
         padding: 16px; display: grid; gap: 14px;
         grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); align-items: end; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px;
          text-transform: uppercase; letter-spacing: .5px; }
  input, select { width: 100%; padding: 8px 10px; background: #12100b; color: var(--ink);
                  border: 1px solid var(--edge); border-radius: 6px; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .wide { grid-column: 1 / -1; }
  .checks { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 14px; }
  .checks label { text-transform: none; letter-spacing: 0; color: var(--ink); font-size: 13px;
                  display: flex; align-items: center; gap: 6px; margin: 0; cursor: pointer; }
  .checks input { width: auto; }
  .actions { grid-column: 1 / -1; display: flex; gap: 12px; align-items: center; }
  button { background: var(--accent); color: #1a1306; border: 0; border-radius: 6px;
           padding: 10px 22px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .status { color: var(--muted); font-size: 13px; }
  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--edge);
          border-top-color: var(--accent); border-radius: 50%; animation: s .8s linear infinite;
          vertical-align: -2px; margin-right: 6px; }
  @keyframes s { to { transform: rotate(360deg); } }
  details { grid-column: 1 / -1; }
  summary { color: var(--muted); font-size: 12px; cursor: pointer; text-transform: uppercase;
            letter-spacing: .5px; }
  details[open] summary { margin-bottom: 8px; }
  pre { margin-top: 18px; background: #0d0b07; border: 1px solid var(--edge); border-radius: 10px;
        padding: 16px; overflow-x: auto; white-space: pre;
        font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; min-height: 60px; }
  pre:empty::before { content: "Results will stream here…"; color: var(--muted); }
  .ln-head { color: var(--accent); font-weight: 600; }
  .ln-sub { color: #9fc8e8; }
  .ln-worse { color: var(--warn); }
  .ln-rx { color: var(--ok); }
  .ln-err { color: var(--warn); font-weight: 600; }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>⚔ Warcraft Logs Analysis</h1>
  <div class="sub">Compare a character's DPS against the ilvl-matched field, then get a
    prioritized to-do list. Runs entirely in your browser (30s–2&nbsp;min).</div>
</header>
<main>
  <form id="form">
    <div><label for="name">Character</label>
      <input id="name" placeholder="Hadryan" required autofocus></div>
    <div><label for="server">Server</label>
      <input id="server" placeholder="proudmoore" required></div>
    <div><label for="region">Region</label>
      <select id="region">
        <option>US</option><option>EU</option><option>KR</option><option>TW</option><option>CN</option>
      </select></div>
    <div><label for="class_name">Class</label>
      <input id="class_name" value="Monk"></div>
    <div><label for="spec">Spec</label>
      <input id="spec" value="Brewmaster"></div>
    <div><label for="difficulty">Difficulty</label>
      <select id="difficulty">
        <option value="5">Mythic</option><option value="4">Heroic</option>
        <option value="3">Normal</option><option value="2">LFR</option>
      </select></div>
    <div><label for="priority">Gear priority stat</label>
      <select id="priority">
        <option>crit</option><option>haste</option><option>mastery</option><option>vers</option>
      </select></div>
    <div class="checks">
      <label><input type="checkbox" value="overview" checked> Overview &amp; ilvl-matched comparison</label>
      <label><input type="checkbox" value="diagnose" checked> Timeline diagnosis</label>
      <label><input type="checkbox" value="gear" checked> Gear audit</label>
      <label><input type="checkbox" value="prescribe" checked> Prescription</label>
    </div>
    <details>
      <summary>Settings</summary>
      <label for="worker">Cloudflare Worker URL</label>
      <input id="worker" placeholder="https://wcl-proxy.you.workers.dev">
    </details>
    <div class="actions">
      <button id="go" type="submit">Analyze</button>
      <span class="status" id="status"></span>
    </div>
  </form>
  <pre id="out"></pre>
</main>
<script type="module" src="./app.js"></script>
</body>
</html>
