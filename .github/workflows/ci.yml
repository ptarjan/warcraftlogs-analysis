# Tests + type-check on every push/PR. Type-check is opt-in per file (// @ts-check)
# and emits nothing -- it's a static gate, the runtime is untouched.
name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run typecheck
