# Tests + type-check + browser build on every push/PR. Type-check is opt-in per file
# (// @ts-check) and emits nothing -- a static gate, the runtime is untouched. The build
# step bundles the browser app so a browser-only break can't slip through to the deploy.
name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run typecheck
      # Also bundle the browser app: a browser-only break (e.g. a node:* import not
      # marked external) passes test+typecheck but fails the Pages deploy. Catch it here.
      - run: npm run build
