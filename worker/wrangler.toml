name = "wcl-proxy"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Lock this to your GitHub Pages origin, e.g. "https://ptarjan.github.io".
# "*" is fine -- this Worker only proxies public Wowhead tooltips, no secret.
[vars]
ALLOWED_ORIGIN = "*"

# No secrets. The app is connect-only: the browser talks to Warcraft Logs with
# the user's own PKCE token, so there's no shared WCL secret here anymore.
# If you set them before, delete the now-unused secrets:
#   cd worker
#   npx wrangler secret delete WCL_CLIENT_ID
#   npx wrangler secret delete WCL_CLIENT_SECRET
